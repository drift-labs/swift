name: build_and_test

on:
  pull_request:
    branches:
      - master
      - mainnet-beta

jobs:
  build_and_test:
    runs-on: ubicloud
    container: rust:1.91.1
    timeout-minutes: 10
    strategy:
      matrix:
        task: ["build", "test"]
    steps:
      # Common steps
      - name: Checkout main
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install OS dependencies
        run: apt-get update && apt-get install -y git libssl-dev

      - name: Install rustfmt and toolchain
        run: rustup component add rustfmt

      - name: Cache cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      # Conditional steps based on matrix task
      - name: Fmt
        if: matrix.task == 'build'
        run: cargo fmt

      - name: Build
        if: matrix.task == 'build'
        run: cargo check

      - name: Setup Redis
        if: matrix.task == 'test'
        run: |
          apt-get install -y redis-server redis-tools
          service redis-server start
          redis-server --daemonize yes

      - name: Add test entries to Redis
        if: matrix.task == 'test'
        run: |
          redis-cli set "swift-hashes::test_hash_1" "test_value_1"
          redis-cli set "swift-hashes::test_hash_2" "test_value_2"

      - name: Run tests
        if: matrix.task == 'test'
        run: cargo test
